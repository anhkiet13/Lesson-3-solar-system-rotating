name: Auto Create Pull Request

on:
  push:
    branches:
    - '**' # Bắt tất cả các nhánh khi dev push lên
    - '!main' # Loại trừ nhánh main để tránh tự tạo PR vào chính nó

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Kéo mã nguồn về
      uses: actions/checkout@v4

    - name: 🚀 Tự động khởi tạo Pull Request hướng về nhánh main
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Auto-commit: Kích hoạt kiểm thử hệ thống"
        title: "🚀 [Auto PR] Kiểm thử nhánh ${{ github.ref_name }} trước khi Merge"
        body: |
          Hệ thống tự động phát hiện mã nguồn mới đẩy lên!
          - **Nhánh đẩy:** `${{ github.ref_name }}`
          - **Nhánh đích:** `main`
        base: main
