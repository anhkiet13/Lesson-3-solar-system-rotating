apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-project-app
  namespace: default
  labels:
    app: mock-project-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mock-project-app
  template:
    metadata:
      labels:
        app: mock-project-app
    spec:
      containers:
      - name: solar-system-container
        image: kietha13/solar-system-3d:latest # Thay 'kietha13' bằng Docker Hub Username 
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mock-project-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: mock-project-app
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32080 # Cổng mở cố định trên Worker Node cho HAProxy kết nối
